server {
    listen 80;
    server_name _;
    include /etc/nginx/snippets/common-locations.conf;
}

# HTTPS on a separate port: mobile browsers only expose getUserMedia (camera
# access) on a "secure context" (HTTPS or localhost). The phone opening the
# /phone-camera/<token> pairing page over plain LAN HTTP would otherwise be
# blocked, so that page is linked with this port instead. Same content/proxy
# as the plain HTTP server above (see common-locations.conf); only the
# transport differs.
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;

    include /etc/nginx/snippets/common-locations.conf;
}
