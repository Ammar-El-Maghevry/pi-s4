services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: attendance
      POSTGRES_PASSWORD: attendance
      POSTGRES_DB: attendance
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendance"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://attendance:attendance@db:5432/attendance
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      CORS_ORIGINS: http://localhost:8080
      PHOTO_STORAGE_DIR: /app/photos
    volumes:
      - photos:/app/photos
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
  photos:
